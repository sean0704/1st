<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan 生日快樂！ 爽爽抽一番賞</title>
    <style>
        /* 基礎設定與一番賞熱血風格背景 */
        body {
            font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #fceea7;
            background-image: 
                radial-gradient(#ffcc00 15%, transparent 16%),
                radial-gradient(#ffcc00 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #333;
            overflow-x: hidden;
            padding-top: 20px;
            padding-bottom: 50px;
        }

        h1 {
            font-family: 'Impact', 'PingFang TC', sans-serif;
            font-size: 42px;
            margin-bottom: 10px;
            color: #e74c3c;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 4px 4px 0 rgba(0,0,0,0.2);
            letter-spacing: 2px;
            text-align: center;
        }

        .subtitle {
            font-size: 18px;
            font-weight: bold;
            color: #c0392b;
            background: #fff;
            padding: 5px 20px;
            border-radius: 20px;
            border: 2px solid #c0392b;
            margin-bottom: 30px;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }

        /* 剩餘張數面板 */
        .status-header {
            font-size: 24px;
            font-weight: 900;
            background: #2c3e50;
            color: #fff;
            padding: 10px 40px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 3px solid #ecf0f1;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .highlight-number {
            color: #f1c40f;
            font-size: 32px;
            font-family: 'Impact', sans-serif;
        }

        /* 獎品配率表 */
        .board-container {
            width: 90%;
            max-width: 800px;
            background: #fff;
            border: 4px solid #2c3e50;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 30px;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.1);
        }

        .board-title {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            border-bottom: 2px dashed #bdc3c7;
            padding-bottom: 10px;
        }

        .prizes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); /* 調整為適合 8 個獎項的大小 */
            gap: 15px;
        }

        .prize-item {
            background: #f8f9fa;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
            min-height: 80px;
        }
        
        /* 針對S賞特別加強視覺 */
        .prize-item.s-prize {
            background: #2c3e50;
            border-color: #ff00ff;
            color: #fff;
            box-shadow: 0 0 10px rgba(255,0,255,0.3);
        }
        .prize-item.s-prize .prize-count { background: rgba(255,255,255,0.2); color: #fff;}

        /* 當獎項被抽完時的樣式 */
        .prize-item.sold-out::after {
            content: 'SOLD OUT';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            background: rgba(231, 76, 60, 0.9);
            color: white;
            font-family: 'Impact', sans-serif;
            font-size: 24px;
            padding: 5px 15px;
            border-radius: 5px;
            border: 2px solid #fff;
            pointer-events: none;
        }

        .prize-badge {
            font-family: 'Impact', sans-serif;
            font-size: 34px;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .prize-count {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            background: #ecf0f1;
            padding: 5px 8px;
            border-radius: 5px;
            color: #2c3e50;
            margin-top: auto;
        }

        /* 控制按鈕區 */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        button {
            background: #e74c3c;
            color: white;
            border: 4px solid #c0392b;
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 6px 0 #c0392b;
            transition: all 0.1s;
            letter-spacing: 2px;
        }

        button:active:not(:disabled) {
            transform: translateY(6px);
            box-shadow: 0 0 0 #c0392b;
        }

        button:disabled {
            background: #95a5a6;
            border-color: #7f8c8d;
            box-shadow: 0 6px 0 #7f8c8d;
            cursor: not-allowed;
            transform: none;
        }

        #reset-btn {
            background: #3498db;
            border-color: #2980b9;
            box-shadow: 0 6px 0 #2980b9;
        }
        #reset-btn:active:not(:disabled) { box-shadow: 0 0 0 #2980b9; }

        /* 抽獎 Overlay (撕籤紙畫面) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-title {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(255,255,255,0.5);
        }

        /* 實體籤紙設計 */
        .tickets-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 900px;
            padding: 20px;
        }

        .ticket-wrapper {
            width: 140px;
            height: 140px;
            position: relative;
            cursor: pointer;
        }

        .ticket-inside {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            border: 2px dashed #7f8c8d;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 10px;
            text-align: center;
        }

        .ticket-inside-badge {
            font-family: 'Impact', sans-serif;
            font-size: 36px;
        }

        .ticket-inside-name {
            font-size: 14px;
            font-weight: bold;
            margin-top: 5px;
            color: #333;
        }

        /* 籤紙上蓋 (撕開的封膜) */
        .ticket-cover {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                45deg,
                #e74c3c,
                #e74c3c 10px,
                #c0392b 10px,
                #c0392b 20px
            );
            border: 3px solid #fff;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: top right;
            box-sizing: border-box;
            z-index: 2;
        }

        .ticket-cover::after {
            content: '點擊撕開 ▼';
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        /* 撕開動畫：往右上角捲起消失 */
        .ticket-wrapper.peeled .ticket-cover {
            transform: scale(0) rotate(45deg);
            opacity: 0;
            pointer-events: none;
        }

        #close-overlay-btn {
            margin-top: 40px;
            background: #f1c40f;
            color: #2c3e50;
            border-color: #f39c12;
            box-shadow: 0 6px 0 #f39c12;
            display: none; /* 籤全撕完才顯示 */
        }
        #close-overlay-btn:active:not(:disabled) { box-shadow: 0 0 0 #f39c12; }

        /* 戰利品區 */
        .inventory-list {
            width: 90%;
            max-width: 800px;
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .inventory-item {
            background: #fff;
            border: 2px solid #2c3e50;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <h1>Ryan 生日快樂！ 爽爽抽一番賞</h1>
    <div class="subtitle">自己的禮物 自己抽 我的刀盾 比比拉布</div>

    <div class="status-header">
        <span>全套 <span id="total-box-count">0</span> 抽</span>
        <span>剩餘：<span class="highlight-number" id="tickets-left">0</span> 張</span>
    </div>

    <div class="controls">
        <button id="draw-1-btn">抽 1 次</button>
        <button id="reset-btn">換新的一箱</button>
    </div>

    <div class="board-container">
        <div class="board-title">📋 獎品配率表 (即時更新)</div>
        <div class="prizes-grid" id="board-grid">
            </div>
    </div>

    <div class="board-container" style="background: transparent; border: none; box-shadow: none;">
        <div class="board-title" style="color: #c0392b; border-bottom-color: #c0392b;">🎒 我的戰利品</div>
        <div class="inventory-list" id="inventory-list">
            </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="overlay-title">手氣如何？自己撕開看看！</div>
        <div class="tickets-container" id="tickets-container">
            </div>
        <button id="close-overlay-btn">確認獎項並返回</button>
    </div>

    <script>
        // 定義一番賞的獎池設定 (總計 10 抽)
        const prizeConfig = [
            { id: 'S', name: 'S賞 荒野亂鬥高級通行券', total: 1, color: '#ff00ff' },
            { id: 'A', name: 'A賞 R幣1000', total: 1, color: '#e74c3c' },
            { id: 'B', name: 'B賞 現金300', total: 1, color: '#e67e22' },
            { id: 'C', name: 'C賞 點數200', total: 1, color: '#f1c40f' },
            { id: 'D', name: 'D賞 電動時間3小時', total: 1, color: '#2ecc71' },
            { id: 'E', name: 'E賞 媽媽親一下', total: 1, color: '#3498db' },
            { id: 'F', name: 'F賞 每個人巴結哥哥講好話', total: 1, color: '#9b59b6' },
            { 
                id: 'G', 
                names: [
                    'G賞 爸爸抱一個', 
                    'G賞 媽媽抱一個', 
                    'G賞 弟弟抱一個'
                ], 
                total: 3, 
                color: '#95a5a6' 
            }
        ];

        // 系統狀態
        let box = []; 
        let remainingCounts = {}; 
        let totalRemaining = 0;
        let boxTotalCapacity = 0;
        let unpeeledCount = 0; 

        // DOM 元素
        const totalBoxCountEl = document.getElementById('total-box-count');
        const ticketsLeftEl = document.getElementById('tickets-left');
        const boardGridEl = document.getElementById('board-grid');
        const draw1Btn = document.getElementById('draw-1-btn');
        const resetBtn = document.getElementById('reset-btn');
        
        const overlay = document.getElementById('overlay');
        const ticketsContainer = document.getElementById('tickets-container');
        const closeOverlayBtn = document.getElementById('close-overlay-btn');
        const inventoryList = document.getElementById('inventory-list');

        // 初始化/重置一整箱
        function initBox() {
            box = [];
            remainingCounts = {};
            totalRemaining = 0;

            // 根據配率生成籤筒
            prizeConfig.forEach(prize => {
                remainingCounts[prize.id] = prize.total;
                totalRemaining += prize.total;
                
                for (let i = 0; i < prize.total; i++) {
                    // 如果該獎項有設定 names 陣列，則依序分配不同的名字 (適用於G賞)
                    let specificName = prize.name;
                    if (prize.names && prize.names.length > i) {
                        specificName = prize.names[i];
                    }

                    box.push({
                        id: prize.id,
                        name: specificName,
                        color: prize.color
                    });
                }
            });
            
            boxTotalCapacity = totalRemaining;
            totalBoxCountEl.textContent = boxTotalCapacity;

            // Fisher-Yates 洗牌演算法 (把籤筒打亂)
            for (let i = box.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [box[i], box[j]] = [box[j], box[i]];
            }

            // 更新畫面
            inventoryList.innerHTML = '';
            updateBoard();
            updateButtons();
        }

        // 更新配率表畫面
        function updateBoard() {
            ticketsLeftEl.textContent = totalRemaining;
            boardGridEl.innerHTML = '';

            // 顯示所有獎項 (只顯示等級，不顯示具體內容)
            prizeConfig.forEach(prize => {
                const left = remainingCounts[prize.id];
                const isSoldOut = left === 0;
                const isSPrize = prize.id === 'S'; 

                const itemDiv = document.createElement('div');
                itemDiv.className = `prize-item ${isSoldOut ? 'sold-out' : ''} ${isSPrize ? 's-prize' : ''}`;
                
                const badgeColor = isSPrize ? '#ff00ff' : prize.color;
                
                itemDiv.innerHTML = `
                    <div class="prize-badge" style="color: ${badgeColor}">${prize.id}賞</div>
                    <div class="prize-count">
                        <span>剩餘</span>
                        <span>${left} / ${prize.total}</span>
                    </div>
                `;
                boardGridEl.appendChild(itemDiv);
            });
        }

        // 更新按鈕狀態
        function updateButtons() {
            draw1Btn.disabled = totalRemaining < 1;
        }

        // 寫入戰利品清單
        function addToInventory(prize) {
            const item = document.createElement('div');
            item.className = 'inventory-item';
            
            if(prize.id === 'S') {
                item.style.borderColor = '#ff00ff';
                item.style.boxShadow = '0 0 10px rgba(255,0,255,0.3)';
            } else {
                item.style.borderColor = prize.color;
            }
            
            // 戰利品區會顯示剛剛產生的具體款式名稱
            item.innerHTML = `
                <span style="color: ${prize.color}; font-family: 'Impact';">${prize.id}賞</span>
                <span>${prize.name}</span>
            `;
            inventoryList.prepend(item);
        }

        // 執行抽獎邏輯
        function drawTickets(times) {
            ticketsContainer.innerHTML = '';
            unpeeledCount = times;
            closeOverlayBtn.style.display = 'none';
            overlay.classList.add('active');

            for (let i = 0; i < times; i++) {
                // 從池子抽出最後一張
                const drawnPrize = box.pop();
                totalRemaining--;
                remainingCounts[drawnPrize.id]--;

                // 建立這張籤的 DOM
                createTicketDOM(drawnPrize);
            }
        }

        // 建立可撕開的籤紙 DOM
        function createTicketDOM(prize) {
            const wrapper = document.createElement('div');
            wrapper.className = 'ticket-wrapper';

            // 內層 (真實獎項 - 撕開才會看到款式)
            const inside = document.createElement('div');
            inside.className = 'ticket-inside';
            inside.innerHTML = `
                <div class="ticket-inside-badge" style="color: ${prize.color}">${prize.id}賞</div>
                <div class="ticket-inside-name">${prize.name}</div>
            `;

            // 外層 (封膜)
            const cover = document.createElement('div');
            cover.className = 'ticket-cover';

            wrapper.appendChild(inside);
            wrapper.appendChild(cover);

            // 點擊撕開事件
            wrapper.addEventListener('click', function peel() {
                if (wrapper.classList.contains('peeled')) return; 
                
                wrapper.classList.add('peeled');
                addToInventory(prize);
                unpeeledCount--;

                // 撕開籤紙後同步更新背景看板
                updateBoard();
                updateButtons();

                if (prize.id === 'S') {
                    setTimeout(() => {
                        alert(`🔥 天選之人！\n恭喜抽中全場唯一：【${prize.name}】！`);
                    }, 500);
                }

                if (unpeeledCount === 0) {
                    closeOverlayBtn.style.display = 'block';
                }
            });

            ticketsContainer.appendChild(wrapper);
        }

        draw1Btn.addEventListener('click', () => drawTickets(1));
        
        resetBtn.addEventListener('click', () => {
            if(confirm('確定要換新的一箱嗎？原有的配率將會重置！')) {
                initBox();
            }
        });

        closeOverlayBtn.addEventListener('click', () => {
            overlay.classList.remove('active');
        });

        initBox();
    </script>

</body>
</html>
